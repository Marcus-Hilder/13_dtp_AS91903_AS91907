<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westlake Clubs - Sign Ups</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head>
<body class="bg-grey">
    <header class="container-fluid">
        <img src="/static/westlake_logo.webp" alt="Westlake Logo">
    </header>

    <h1 class="col-3 mx-auto py-2 mt-5 text-center fs-2 text-light rounded custom-page-header">
        Registration Form
    </h1>

    <div class="card col-7 mx-auto mt-5">
        <div class="card-body p-5">
            <h5 class="card-title">Sign Ups</h5>
            <h6 class="card-subtitle mb-2 text-body-secondary">Fill out this form to sign up for a club</h6>
            <div class="my-4">
                <p class="card-text">Full Name</p>
                <input class="col-12 col-xxl-6 col-sm-10 px-3 custom-input-bar" type="text" name="" id="">
            </div>
            <div class="my-4">
                <p class="card-text">Email</p>
                <input class="col-12 col-xxl-6 col-sm-10 px-3 custom-input-bar" type="text" name="" id="">
            </div>
            <div class="my-4">
                <p class="card-text">Club Interest</p>
                <input class="col-12 col-xxl-6 col-sm-10 px-3 custom-input-bar" type="text" name="" id="">
                <button class="btn dropdown-toggle dropdown-Ryan position-absolute navbar-toggler-icon" data-bs-toggle="dropdown" aria-expanded="false"></button>
                <ul class="dropdown-menu custom-dropdown-menu">
                    <li>
                        <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Running Club</a>
                        <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Sign Ups</a>
                        <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Enquiries</a>
                        <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Timetable</a>
                        <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Create Club</a>
                        <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Review</a>
                    </li>
                </ul>
            </div>
            <div class="my-4">
                <p class="card-text">Why do you want to join?</p>
                <input class="col-12 col-xxl-6 col-sm-10 px-3 custom-input-bar" type="text" name="" id="">
            </div>
            <div class="my-4">
                <p class="card-text">Will you be able to attend the meetings?</p>
                <input class="col-12 col-xxl-6 col-sm-10 px-3 custom-input-bar" type="text" name="" id="">
            </div>
            
            <a href="#" class="btn custom-button">Sign Up</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
