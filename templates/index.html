{% extends 'base.html' %}
{% block content %}
<main>
      <!-- This "section" contains the hero image, hero image overlay, and the header for the website -->
    <section class="position-relative">
        <img src="/static/hero_image.jpg" alt="fixed_image" class="fixed_img">
        <!-- This is the overlay that contains the title and year -->
            <div class="position-absolute bg-light bg-opacity-75 rounded-4 p-3 text-center overlay col-4 col-sm-3 col-md-5 col-lg-4">
                <div class="fs-1">Westlake Clubs</div>
                <div class="fs-1 red_overlay">2026</div>
            </div>
            <!-- This is the header for the website -->
            <h1 class="col-10 col-sm-6 col-md-6 col-lg-4 mx-auto py-2 mt-5 text-center fs-2 text-light rounded-4 custom-page-header autoShow">
              Welcome to the Westlake Clubs website!
            </h1>

    </section>
    <!-- This section contains the vector background, a brief description of the website within a card, and the carousel -->
    <div class="vector_background">
      <!-- This is the vector background, which sits at a z-index below the other elements which pushes it behind all other website elements -->
      <div class="vector-container-1 h-100 w-100">
        <img class="sign_ups_redvector w-100" src="/static/FINALVECTOR.png" alt="Red Vector">
      </div>
      <!-- This is the card that contains a brief description of the website, which 'autoshows' as the user scrolls down -->
      <div class="autoShow card border-5 mx-auto mt-5 text-center index_card col-10 col-sm-10 col-md-10 col-lg-7">
          <div class="card-body">
              <h2 class="card-title">One place to know all about clubs we have to offer</h2>
              <hr>
              <p class="fs-4">
                   
              </p>
          </div>
      </div>
      <br>
      <br>
      <br>
      <!-- This is the carousel, which 'autoshows' as the user scrolls down. The carousel contains placeholder images of westlake 'clubs' and has a button 
      on the bottom which would take them to the clubs page, (would be developed if we were to publish this website) -->
      <div id="carouselExampleCaptions" class="carousel slide carousel-fade col-10 col-sm-10 col-md-10 col-lg-10 mx-auto" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>

        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="/static/carousel_1.jpg" class="d-block w-100" alt="image of westlake clubs">
            <div class="carousel-caption d-none d-md-block">
              <button type="button" class="btn bg-light">
                <span class="d-flex my-auto">Running Club</span>
              </button>
            </div>
          </div>
          <div class="carousel-item">
            <img src="/static/carousel_3.jpg" class="d-block w-100" alt="image of westlake clubs">
            <div class="carousel-caption d-none d-md-block">
              <button type="button" class="btn bg-light">
                <span class="d-flex my-auto">Rugby Club</span>
              </button>
            </div>
          </div>
          <div class="carousel-item">
            <img src="/static/football.jpg" class="d-block w-100" alt="image of westlake clubs">
            <div class="carousel-caption d-none d-md-block">
              <button type="button" class="btn bg-light">
                <span class="d-flex my-auto">Football Club</span>
              </button>
            </div>
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
      <br>
      <!-- This is the button that takes the user to the timetable page for easier access -->
      <div class="d-flex justify-content-center mt-5 col-10 col-sm-10 col-md-10 col-lg-7 mx-auto">
        <a class="btn btn-danger btn-lg rounded-4" href="{{ url_for('timetable') }}">
          Click here for access to the timetable
        </a>
      </div>
    </div>

</main>

{% endblock %}
