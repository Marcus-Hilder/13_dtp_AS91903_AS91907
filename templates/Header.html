<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <link rel="icon" type="image/x-icon" href="/static/wbhs-icon-p.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="container-fluid">
        <img src="/static/westlake_logo.webp" alt="Westlake Logo">
    </header>
    <nav class="navbar navbar-expand-lg navbar-wl">
        <div class="container-fluid">
            <img src="" alt="">
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav mb-2 mb-lg-0 ms-lg-2">
                    <li class="nav-item mx-1 my-1">
                        <a href="/"><button type="button" class="btn nav-btn-consistent w-100">Home</button></a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="/sign_ups"><button type="button" class="btn nav-btn-consistent w-100">Sign Ups</button></a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="#"><button type="button" class="btn nav-btn-consistent w-100">Enquiries</button></a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="/TimeTable"><button type="button" class="btn nav-btn-consistent w-100">Timetable</button></a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="#"><button type="button" class="btn nav-btn-consistent w-100">Create Club</button></a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="#"><button type="button" class="btn nav-btn-consistent w-100">Review</button></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% block content %}
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
