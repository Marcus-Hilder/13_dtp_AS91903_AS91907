<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <link rel="icon" type="image/x-icon" href="/static/wbhs-icon-p.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_forward_ios" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back_ios" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-grey">
    <header class="container-fluid">
        <img src="/static/westlake_logo.webp" alt="Westlake Logo">
    </header>
    <nav class="navbar navbar-expand-lg navbar-wl">
        <div class="container-fluid">
            <img src="" alt="">
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav mb-2 mb-lg-0 ms-lg-2">
                    <li class="nav-item mx-1 my-1">
                        <a href="{{ url_for('index') }}">
                            <button type="button" class="btn {% if active_page == 'index' %}nav-btn-active{% else %}nav-btn-consistent{% endif %} w-100">Home</button>
                        </a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="{{ url_for('sign_ups') }}">
                            <button type="button" class="btn {% if active_page == 'sign_ups' %}nav-btn-active{% else %}nav-btn-consistent{% endif %} w-100">Sign Ups</button>
                        </a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="{{ url_for('enquiries') }}">
                            <button type="button" class="btn {% if active_page == 'enquiries' %}nav-btn-active{% else %}nav-btn-consistent{% endif %} w-100">Enquiries</button>
                        </a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="{{ url_for('timetable') }}">
                            <button type="button" class="btn {% if active_page == 'timetable' %}nav-btn-active{% else %}nav-btn-consistent{% endif %} w-100">Timetable</button>
                        </a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="{{ url_for('create_club') }}">
                            <button type="button" class="btn {% if active_page == 'create_club' %}nav-btn-active{% else %}nav-btn-consistent{% endif %} w-100">Create Club</button>
                        </a>
                    </li>
                    <li class="nav-item mx-1 my-1">
                        <a href="{{ url_for('review') }}">
                            <button type="button" class="btn {% if active_page == 'review' %}nav-btn-active{% else %}nav-btn-consistent{% endif %} w-100">Review</button>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <img class="top_vector" src="/static/TopGreenVector.png" alt="Green Vector">

    {% block content %}{% endblock %}

    <img class="bottom_vector" src="/static/BottomGreenVector.png" alt="Green Vector">

    <div class="container-fluid custom-footer py-3 text-white text-center">
        <ul class="nav justify-content-center mb-4 my-3 gap-0"> 
            <li class="nav-item">
                <div class="dropup">
                    <button type="button" class="btn dropdown-toggle text-white" data-bs-toggle="dropdown">Our Sponsors</button>
                    <ul class="dropdown-menu custom-drop-item">
                        <li>
                            <a class="dropdown-item" href="#">
                                <img src="/static/nzqa.png" class="nzqa">
                            </a>
                        </li>
                        <hr>
                        <li>
                            <a class="dropdown-item" href="#">
                                <img src="/static/ministry_of_education.png">
                            </a>
                        </li>
                        <hr>
                        <li>
                            <a class="dropdown-item" href="#">
                                <img src="/static/ibsc.png" class="ibsc">
                            </a>
                        </li>
                        <hr>
                        <li>
                            <a class="dropdown-item" href="#">
                                <img src="/static/westlakers.jpg" class="westlakers_logo">
                            </a>
                        </li>
                    </ul>
                </div>
            </li>
            <div class="vr bg-white mx-4 d-none d-sm-block"></div>
            <li class="nav-item">
                <div class="dropup">
                    <button type="button" class="btn dropdown-toggle text-white" data-bs-toggle="dropdown">Contact Us</button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Phone: +64 9 410 8667</a></li>
                        <hr>
                        <li><a class="dropdown-item" href="#">Fax: +64 9 410 7717</a></li>
                        <hr>
                        <li><a class="dropdown-item" href="#">Email: office@westlake.school.nz</a></li>
                    </ul>
                </div>
            </li>
            <div class="vr bg-white mx-4 d-none d-sm-block"></div>
            <li class="nav-item">
                <a class="nav-link text-white" href="#">Privacy Policy</a>
            </li>
            <div class="vr bg-white mx-4 d-none d-sm-block"></div>
            <li class="nav-item">
                <a class="nav-link text-white" href="#">Terms of Service</a>
            </li>
            
        </ul>
        <a href="#"><img src="/static/westlake_logo.webp" alt="Westlake logo" class="footer-logo"></a>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
