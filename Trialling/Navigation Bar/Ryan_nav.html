<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Trial - Ryan</title>
    <link rel="stylesheet" href="/Trialling/style_trial.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head>
<body>
    <div class="nav-mobile-Ryan">
        <div class="navbar">
            <div class="container-fluid navbar-color-Ryan p-2">
                <div class="btn-group">
                    <button class="btn dropdown-toggle dropdown-Ryan ms-3" data-bs-toggle="dropdown" aria-expanded="false">
                        Menu
                    </button>
                    <ul class="dropdown-menu custom-dropdown-menu-Ryan">
                        <li>
                            <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Home</a>
                            <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Sign Ups</a>
                            <a href="" class="dropdown-item custom-dropdown-item-Ryan py-3">Enquiries</a>

                    </ul>
                </div>
                
            </div>
        </div>
    </div>

    <div class="nav-desktop-Ryan">
        <div class="navbar">
            <div class="container-fluid navbar-color-Ryan p-3">
                <div class="btn-group container-fluid d-block">
                    <button type="button" class="btn text-light navbar-button-active-Ryan mx-3 my-1">Home</button>
                    <button type="button" class="btn text-light navbar-button-Ryan mx-3 my-1">Sign Ups</button>

                    <button type="button" class="btn text-light navbar-button-Ryan mx-3 my-1">Review</button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 

</body>
</html>
